<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caido Proxy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <div class="logo"></div>
        <h1>Caido Proxy</h1>
      </div>
      <div class="status-indicator"></div>
    </div>
    
    <div class="main-control">
      <label class="switch">
        <input type="checkbox" id="proxy-toggle">
        <span class="slider round"></span>
      </label>
      <span id="status-text" class="status-text">OFF</span>
    </div>

    <div class="config-section">
      <div class="input-group">
        <label for="host">Host</label>
        <input type="text" id="host" value="127.0.0.1" placeholder="127.0.0.1">
      </div>
      <div class="input-group">
        <label for="port">Port</label>
        <input type="number" id="port" value="8080" placeholder="8080">
      </div>
      <button id="save-btn" class="save-btn">Save Configuration</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
